version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: crm_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: crm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: crm_redis

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_web
    # Lệnh thông minh giải quyết bài toán con gà quả trứng
    command: sh -c "if [ ! -f manage.py ]; then django-admin startproject core .; fi && python manage.py runserver 0.0.0.0:8000"
    volumes:
      # Đồng bộ code từ ngoài VS Code vào thư mục /app trong Docker
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

volumes:
  postgres_data: